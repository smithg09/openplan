name: Create Version Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: 'Explicit version — overrides bump (e.g. 1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A PAT is required so the tag push triggers the release.yml workflow.
          # Create a classic token with repo scope and add it as RELEASE_PAT.
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        run: |
          BUMP="${{ github.event.inputs.version || github.event.inputs.bump }}"
          bash scripts/release.sh "$BUMP"
