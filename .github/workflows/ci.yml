name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Full Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod
          cache-dependency-path: apps/cli/go.sum

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI
        run: bun run build:ui

      - name: Build CLI
        run: |
          cd apps/cli
          go build -ldflags="-s -w" -o ../../bin/openplan .

      - name: Verify binary
        run: ./bin/openplan --version
